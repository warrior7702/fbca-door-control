<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBCA Door Camera Monitor</title>
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="alternate icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/calendar.css" rel="stylesheet">
    <link href="/css/status.css" rel="stylesheet">
    
    <style>
        body {
            background: #0a1628 !important;
            color: #fff;
        }
        
        .filter-bar {
            padding: 1rem 1.5rem;
            background: rgba(27, 54, 95, 0.6);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .search-wrapper {
            position: relative;
            flex: 1;
            max-width: 400px;
        }
        
        .search-wrapper input {
            width: 100%;
            padding: 0.5rem 1rem 0.5rem 2.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
        }
        
        .search-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            opacity: 0.6;
        }
        
        .door-autocomplete {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: rgba(27, 54, 95, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 1001;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }
        
        .autocomplete-item {
            padding: 0.75rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        
        .autocomplete-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .autocomplete-item .door-name {
            font-weight: 600;
        }
        
        .autocomplete-item .door-details {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .camera-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 1.5rem;
            padding: 1.5rem;
        }
        
        .camera-card {
            background: rgba(27, 54, 95, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .camera-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }
        
        .camera-card.hidden {
            display: none;
        }
        
        .camera-header {
            padding: 1rem 1.25rem;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .camera-name {
            font-weight: 600;
            font-size: 1rem;
            color: #fff;
        }
        
        .camera-status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-dot.online {
            background: #28a745;
            box-shadow: 0 0 8px #28a745;
        }
        
        .status-dot.offline {
            background: #dc3545;
            box-shadow: 0 0 8px #dc3545;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .camera-feed {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .camera-feed iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .camera-placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-size: 3rem;
        }
        
        .loading-feed {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .camera-footer {
            padding: 1rem 1.25rem;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .camera-info {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .camera-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn-camera {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-camera:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        
        .btn-camera:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-unlock {
            background: rgba(40, 167, 69, 0.2);
            border-color: rgba(40, 167, 69, 0.5);
        }
        
        .btn-unlock:hover:not(:disabled) {
            background: rgba(40, 167, 69, 0.3);
        }
        
        .btn-lock {
            background: rgba(220, 53, 69, 0.2);
            border-color: rgba(220, 53, 69, 0.5);
        }
        
        .btn-lock:hover:not(:disabled) {
            background: rgba(220, 53, 69, 0.3);
        }
        
        @media (max-width: 768px) {
            .camera-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Unified Header -->
    <header class="unified-header">
        <div class="header-main">
            <div class="brand">
                <div class="brand-icon" style="width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 28px; height: 28px; color: #75D3F2;">
                        <rect x="4" y="2" width="16" height="20" rx="1" fill="none" stroke="currentColor"/>
                        <line x1="5" y1="7" x2="19" y2="7"/>
                        <line x1="5" y1="13" x2="19" y2="13"/>
                        <circle cx="17" cy="12" r="1" fill="currentColor"/>
                    </svg>
                </div>
                <div class="brand-text">
                    <div class="brand-title">FBCA Door Control</div>
                    <div class="brand-subtitle">Camera Monitor</div>
                </div>
            </div>
            <div class="header-actions">
                <a href="/calendar.html" class="btn btn-primary-gradient">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    <span>Calendar</span>
                </a>
                <a href="/status.html" class="btn btn-primary-gradient">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="4" y="2" width="16" height="20" rx="1"/>
                        <line x1="5" y1="7" x2="19" y2="7"/>
                        <line x1="5" y1="13" x2="19" y2="13"/>
                        <circle cx="17" cy="12" r="1" fill="currentColor"/>
                    </svg>
                    <span>Status</span>
                </a>
                <button class="btn btn-primary-gradient" onclick="refreshCameras()">
                    <span id="refreshSpinner" class="spinner-border spinner-border-sm d-none me-1"></span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
                    </svg>
                    <span>Refresh</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <div class="search-wrapper">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="text" id="doorSearch" placeholder="Search doors..." oninput="handleDoorSearch()">
            <div id="doorAutocomplete" class="door-autocomplete"></div>
        </div>
        <button onclick="clearSearchFilter()" class="btn btn-glass">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
            <span>Clear</span>
        </button>
    </div>

    <div class="container-fluid">
        <div class="camera-grid" id="cameraGrid">
            <div class="loading-state" style="grid-column: 1 / -1; text-align: center; padding: 4rem 2rem; color: rgba(255, 255, 255, 0.5);">
                <div class="spinner-border text-light mb-3"></div>
                <p>Loading cameras...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allDoorCameras = [];
        let unlockTimers = {};
        
        // Load door-camera mappings on page load
        async function loadCameras() {
            try {
                const response = await fetch('/api/camera/mappings');
                
                // Check if redirected to login (302/401/403)
                if (response.redirected || response.status === 401 || response.status === 403) {
                    // Redirect to calendar.html which will trigger Azure AD login, then come back
                    sessionStorage.setItem('returnTo', '/cameras.html');
                    window.location.href = '/calendar.html';
                    return;
                }
                
                allDoorCameras = await response.json();
                
                renderCameraCards(allDoorCameras);
            } catch (error) {
                console.error('Failed to load cameras:', error);
                document.getElementById('cameraGrid').innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 4rem 2rem; color: rgba(255, 255, 255, 0.5);">
                        <p>Failed to load cameras. Please refresh.</p>
                    </div>
                `;
            }
        }
        
        function renderCameraCards(cameras) {
            const grid = document.getElementById('cameraGrid');
            
            if (cameras.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 4rem 2rem; color: rgba(255, 255, 255, 0.5);">
                        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity: 0.3; margin-bottom: 1rem;">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                            <circle cx="12" cy="13" r="4"/>
                        </svg>
                        <p>No cameras configured yet</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = cameras.map(cam => `
                <div class="camera-card" data-door-id="${cam.doorID}" data-door-name="${cam.doorName.toLowerCase()}">
                    <div class="camera-header">
                        <div class="camera-name">${cam.cameraName}</div>
                        <div class="camera-status">
                            <span class="status-dot online"></span>
                            <span>Online</span>
                        </div>
                    </div>
                    <div class="camera-feed" id="feed-${cam.doorID}">
                        <svg class="camera-placeholder" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                            <circle cx="12" cy="13" r="4"/>
                        </svg>
                    </div>
                    <div class="camera-footer">
                        <div class="camera-info">
                            <div>${cam.doorName} • ${cam.building}</div>
                            <div style="font-size: 0.75rem; margin-top: 0.25rem;">${cam.location || ''}</div>
                        </div>
                        <div class="camera-actions">
                            <button class="btn-camera btn-unlock" onclick="unlockDoor(${cam.doorID}, this)">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
                                </svg>
                                <span>Unlock</span>
                            </button>
                            <button class="btn-camera btn-lock" onclick="lockDoor(${cam.doorID}, this)">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                                <span>Lock</span>
                            </button>
                            <button class="btn-camera" onclick="loadCameraFeed(${cam.doorID})">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="15 3 21 3 21 9"/>
                                    <polyline points="9 21 3 21 3 15"/>
                                    <line x1="21" y1="3" x2="14" y2="10"/>
                                    <line x1="3" y1="21" x2="10" y2="14"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        async function loadCameraFeed(doorId) {
            const feedDiv = document.getElementById(`feed-${doorId}`);
            feedDiv.innerHTML = '<div class="loading-feed"><div class="spinner-border text-light"></div></div>';
            
            try {
                const response = await fetch(`/api/camera/door/${doorId}/embed`, { method: 'POST' });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', [...response.headers]);
                
                const text = await response.text();
                console.log('Response body:', text);
                
                const data = JSON.parse(text);
                console.log('Parsed data:', data);
                
                if (data.embed_url || data.url) {
                    const embedUrl = data.embed_url || data.url;
                    feedDiv.innerHTML = `<iframe src="${embedUrl}" allowfullscreen></iframe>`;
                } else {
                    throw new Error('No embed URL in response: ' + JSON.stringify(data));
                }
            } catch (error) {
                console.error('Failed to load camera feed:', error);
                feedDiv.innerHTML = `
                    <div style="color: rgba(255, 255, 255, 0.5); text-align: center;">
                        <p>Failed to load feed</p>
                        <button class="btn-camera" onclick="loadCameraFeed(${doorId})">Retry</button>
                    </div>
                `;
            }
        }
        
        function handleDoorSearch() {
            const searchInput = document.getElementById('doorSearch');
            const searchTerm = searchInput.value.toLowerCase();
            const autocompleteDiv = document.getElementById('doorAutocomplete');
            
            // Filter camera cards
            document.querySelectorAll('.camera-card').forEach(card => {
                const doorName = card.dataset.doorName;
                const matches = doorName.includes(searchTerm);
                card.classList.toggle('hidden', !matches);
            });
            
            // Show autocomplete if ≥2 chars
            if (searchTerm.length >= 2) {
                const matches = allDoorCameras.filter(cam => 
                    cam.doorName.toLowerCase().includes(searchTerm) ||
                    cam.cameraName.toLowerCase().includes(searchTerm)
                ).slice(0, 10);
                
                if (matches.length > 0) {
                    autocompleteDiv.innerHTML = matches.map(cam => `
                        <div class="autocomplete-item" onclick="selectDoor('${cam.doorName}')">
                            <div class="door-name">${cam.doorName}</div>
                            <div class="door-details">${cam.cameraName} • ${cam.building}</div>
                        </div>
                    `).join('');
                    autocompleteDiv.style.display = 'block';
                } else {
                    autocompleteDiv.style.display = 'none';
                }
            } else {
                autocompleteDiv.style.display = 'none';
            }
        }
        
        function selectDoor(doorName) {
            const searchInput = document.getElementById('doorSearch');
            const autocompleteDiv = document.getElementById('doorAutocomplete');
            
            searchInput.value = doorName;
            autocompleteDiv.style.display = 'none';
            handleDoorSearch();
        }
        
        function clearSearchFilter() {
            document.getElementById('doorSearch').value = '';
            document.getElementById('doorAutocomplete').style.display = 'none';
            document.querySelectorAll('.camera-card').forEach(card => {
                card.classList.remove('hidden');
            });
        }
        
        function unlockDoor(doorId, buttonElement) {
            console.log('Unlocking door:', doorId);
            buttonElement.disabled = true;
            
            const originalText = buttonElement.querySelector('span').textContent;
            let timeLeft = 30;
            
            function updateTimer() {
                buttonElement.querySelector('span').textContent = `Unlocked (${timeLeft}s)`;
                timeLeft--;
                
                if (timeLeft < 0) {
                    clearInterval(unlockTimers[doorId]);
                    delete unlockTimers[doorId];
                    buttonElement.disabled = false;
                    buttonElement.querySelector('span').textContent = originalText;
                    console.log('Auto-relocked door:', doorId);
                } else {
                    unlockTimers[doorId] = setTimeout(updateTimer, 1000);
                }
            }
            
            updateTimer();
            // TODO: Call actual API to unlock door
            // fetch(`/api/doors/${doorId}/unlock`, { method: 'POST' });
        }
        
        function lockDoor(doorId, buttonElement) {
            console.log('Locking door:', doorId);
            
            if (unlockTimers[doorId]) {
                clearInterval(unlockTimers[doorId]);
                delete unlockTimers[doorId];
                
                const card = buttonElement.closest('.camera-card');
                const unlockBtn = card.querySelector('.btn-unlock');
                unlockBtn.disabled = false;
                unlockBtn.querySelector('span').textContent = 'Unlock';
            }
            
            buttonElement.disabled = true;
            const originalText = buttonElement.querySelector('span').textContent;
            buttonElement.querySelector('span').textContent = 'Locking...';
            
            setTimeout(() => {
                buttonElement.disabled = false;
                buttonElement.querySelector('span').textContent = originalText;
                console.log('Door locked:', doorId);
            }, 1000);
            
            // TODO: Call actual API to lock door
            // fetch(`/api/doors/${doorId}/lock`, { method: 'POST' });
        }
        
        function refreshCameras() {
            const spinner = document.getElementById('refreshSpinner');
            spinner.classList.remove('d-none');
            loadCameras().finally(() => spinner.classList.add('d-none'));
        }
        
        // Check if we just logged in and should return to cameras
        document.addEventListener('DOMContentLoaded', () => {
            // Check if returning from calendar after login
            const returnTo = sessionStorage.getItem('returnTo');
            if (window.location.pathname === '/calendar.html' && returnTo === '/cameras.html') {
                sessionStorage.removeItem('returnTo');
                window.location.href = '/cameras.html';
                return;
            }
            
            // Normal load
            loadCameras();
        });
    </script>
</body>
</html>
