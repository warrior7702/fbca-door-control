<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBCA Door Status Monitor</title>
    
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="alternate icon" href="/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/calendar.css" rel="stylesheet">
    <link href="/css/status.css" rel="stylesheet">
</head>
<body>
    <header class="unified-header">
        <div class="header-main">
            <div class="brand">
                <img src="/images/fbca-logo.png" alt="FBCA" style="height: 48px; width: auto; filter: brightness(1.1);">
                <div class="brand-text">
                    <div class="brand-title">Door Control</div>
                    <div class="brand-subtitle">Status Monitor</div>
                </div>
            </div>
            <div class="header-actions">
                <a href="/calendar.html" class="btn btn-primary-gradient">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                    <span>Calendar</span>
                </a>
                <a href="/cameras.html" class="btn btn-primary-gradient">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                    <span>Cameras</span>
                </a>
                <button class="btn btn-primary-gradient" onclick="refreshStatus()">
                    <span id="refreshSpinner" class="spinner-border spinner-border-sm d-none me-1"></span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
                    </svg>
                    <span>Refresh</span>
                </button>
            </div>
        </div>
        
        <div class="stats-strip">
            <div class="stat-pill active" data-filter="all" onclick="setFilter('all')">
                <span class="stat-number" id="totalDoors">0</span>
                <span class="stat-label">All Doors</span>
            </div>
            <div class="stat-pill online" data-filter="online" onclick="setFilter('online')">
                <span class="stat-number" id="onlineDoors">0</span>
                <span class="stat-label">Online</span>
            </div>
            <div class="stat-pill offline" data-filter="offline" onclick="setFilter('offline')">
                <span class="stat-number" id="offlineDoors">0</span>
                <span class="stat-label">Offline</span>
            </div>
            <div class="stat-pill unlocked" data-filter="unlocked" onclick="setFilter('unlocked')">
                <span class="stat-number" id="unlockedDoors">0</span>
                <span class="stat-label">Unlocked</span>
            </div>
            <div class="stat-divider"></div>
            <div class="search-inline">
                <div style="position: relative; flex: 1;">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); pointer-events: none; z-index: 1; opacity: 0.6;">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input type="text" id="doorSearch" placeholder="Search doors..." oninput="handleDoorSearch()">
                </div>
                <button onclick="clearSearchFilter()" class="btn btn-glass" style="flex-shrink: 0; padding: 0.5rem 0.75rem;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="last-sync">
                <span class="sync-label">Last Sync:</span>
                <span class="sync-time" id="lastSyncTime">--</span>
            </div>
        </div>
    </header>

    <div class="container-fluid main-content">
        <main class="door-panel" id="doorPanel">
            <div class="panel-header">
                <div class="panel-title-section">
                    <span class="dropdown-label">Buildings:</span>
                    <select id="buildingSelect" class="building-select" onchange="filterByBuilding(this.value)">
                        <option value="all">All Buildings</option>
                        <option value="Main">Main Church</option>
                        <option value="Wade">Wade Building</option>
                        <option value="Student Center">Student Center</option>
                        <option value="PCB">Preschool & Children's Building</option>
                    </select>
                    <span class="panel-count" id="panelDoorCount"></span>
                </div>
                <div class="panel-actions">
                    <button class="btn-expand" onclick="expandAll()">Expand All</button>
                    <button class="btn-collapse" onclick="collapseAll()">Collapse All</button>
                </div>
            </div>
            <div class="panel-body" id="statusTree">
                <div class="loading-state">
                    <div class="spinner-border text-light"></div>
                    <p>Loading door status...</p>
                </div>
            </div>
        </main>
    </div>

    <aside class="detail-panel" id="detailPanel">
        <div class="detail-header">
            <div class="detail-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="4" y="2" width="16" height="20" rx="1"/>
                    <line x1="5" y1="7" x2="19" y2="7"/>
                    <line x1="5" y1="13" x2="19" y2="13"/>
                    <circle cx="17" cy="12" r="1" fill="currentColor"/>
                </svg>
            </div>
            <h5 id="detailPanelTitle">Select a door</h5>
            <button class="detail-close" onclick="closeDetailPanel()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <div class="detail-body">
            <div class="detail-section">
                <div class="detail-row">
                    <span class="detail-label">Status</span>
                    <span class="detail-value" id="panelStatus">--</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Controller</span>
                    <span class="detail-value" id="panelController">--</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Last Sync</span>
                    <span class="detail-value" id="panelLastSync">--</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Device ID</span>
                    <span class="detail-value" id="panelDeviceId">--</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Schedule</span>
                    <span class="detail-value" id="panelSchedule">--</span>
                </div>
            </div>
            
            <div class="detail-actions">
                <button class="btn-unlock" id="panelUnlockBtn" onclick="unlockSelectedDoor()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
                    </svg>
                    <span>Unlock Now</span>
                </button>
                <button class="btn-lock" id="panelLockBtn" onclick="lockSelectedDoor()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <span>Lock Now</span>
                </button>
            </div>
        </div>
    </aside>

    <div class="toast-container position-fixed top-0 end-0 p-3">
        <div id="successToast" class="toast modern-toast toast-success" role="alert">
            <div class="toast-content">
                <div class="toast-icon">✓</div>
                <div class="toast-body" id="successToastMessage"></div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
            </div>
        </div>
        <div id="errorToast" class="toast modern-toast toast-error" role="alert">
            <div class="toast-content">
                <div class="toast-icon">⚠️</div>
                <div class="toast-body" id="errorToastMessage"></div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/status.js"></script>

    <div class="modal fade" id="buildingActionModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content confirm-modal">
                <div class="confirm-header">
                    <div class="confirm-icon">⚠️</div>
                    <h5 id="confirmTitle">Confirm Action</h5>
                </div>
                <div class="confirm-body">
                    <p id="confirmMessage">Are you sure?</p>
                    <div class="confirm-details" id="confirmDetails"></div>
                </div>
                <div class="confirm-footer">
                    <button class="btn-cancel" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn-confirm" id="confirmActionBtn" onclick="executeBuildingAction()">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Autocomplete dropdown (position: fixed, appended to body to avoid z-index stacking issues) -->
    <div id="doorAutocomplete" style="position: fixed; background: rgba(27, 54, 95, 0.95); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; max-height: 300px; overflow-y: auto; display: none; z-index: 999999; box-shadow: 0 8px 24px rgba(0,0,0,0.5); min-width: 250px;"></div>
    
    <!-- Auth Check -->
    <script>
        // Check authentication on page load
        fetch('/api/auth/user')
            .then(res => res.json())
            .then(data => {
                if (!data.isAuthenticated) {
                    // Redirect to login
                    window.location.href = data.loginUrl || '/api/auth/login';
                }
            })
            .catch(err => {
                console.error('Auth check failed:', err);
                // Redirect to login on error
                window.location.href = '/api/auth/login';
            });
    </script>
</body>
</html>
